name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: soorat
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/hisab
          path: hisab
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/prakash
          path: prakash
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/ranga
          path: ranga
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/impetus
          path: impetus
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/pravash
          path: pravash
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soorat
      - run: cargo fmt --all -- --check
        working-directory: soorat
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: soorat
      - run: cargo check
        working-directory: soorat
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: soorat
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/hisab
          path: hisab
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/prakash
          path: prakash
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/ranga
          path: ranga
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/impetus
          path: impetus
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/pravash
          path: pravash
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit
        working-directory: soorat
  deny:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: soorat
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/hisab
          path: hisab
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/prakash
          path: prakash
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/ranga
          path: ranga
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/impetus
          path: impetus
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/pravash
          path: pravash
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: soorat/Cargo.toml
  test:
    name: Test (${{ matrix.os }})
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: soorat
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/hisab
          path: hisab
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/prakash
          path: prakash
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/ranga
          path: ranga
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/impetus
          path: impetus
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/pravash
          path: pravash
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soorat
      - run: cargo test
        working-directory: soorat
      - run: cargo test --doc
        working-directory: soorat
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
        with:
          path: soorat
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/hisab
          path: hisab
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/prakash
          path: prakash
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/ranga
          path: ranga
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/impetus
          path: impetus
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/pravash
          path: pravash
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soorat
      - run: cargo install cargo-llvm-cov
      - run: cargo llvm-cov --lcov --output-path lcov.info
        working-directory: soorat
      - uses: codecov/codecov-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: soorat/lcov.info
          fail_ci_if_error: false
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
        with:
          path: soorat
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/hisab
          path: hisab
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/prakash
          path: prakash
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/ranga
          path: ranga
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/impetus
          path: impetus
      - uses: actions/checkout@v4
        with:
          repository: MacCracken/pravash
          path: pravash
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soorat
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps
        working-directory: soorat
